name: Deploy ACORD25 Python App to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - uses: actions/checkout@v3

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Login to Azure using Service Principal
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Step 5: Deploy app to Azure Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ai-cert-api-web-dev          # Your Azure Web App name
          slot-name: production
          package: .
          startup-command: "gunicorn -w 4 -b 0.0.0.0:8000 main:app"  # Adjust if your entry file or app name is different

      # Step 6: Set environment variables from GitHub secrets
      - name: Set environment variables
        run: |
          az webapp config appsettings set \
            --name ai-cert-api-web-dev \
            --resource-group ai-cert-api-rg-dev \
            --settings EMAIL=${{ secrets.EMAIL }} PASSWORD=${{ secrets.PASSWORD }}